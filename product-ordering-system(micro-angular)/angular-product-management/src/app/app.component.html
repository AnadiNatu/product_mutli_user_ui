<!-- Global Loading Overlay -->
@if (isLoading) {
  <div class="loading-overlay">
    <div class="spinner-container">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-3 text-white">Loading...</p>
    </div>
  </div>
}
