
<div [class]="getCardClasses()" [appHighlight]="isFeatured ? '#e8f5e9' : ''">
  <!-- Card Header -->
  <div class="card-header bg-transparent border-0 d-flex justify-content-between align-items-center">
    <h5 class="card-title mb-0">{{ title | titlecase }}</h5>
    
    <!-- Conditional rendering using @if (Angular 17+) -->
    @if (isFeatured) {
      <span class="badge bg-success">
        <i class="bi bi-star-fill me-1"></i> Featured
      </span>
    }
  </div>

  <!-- Card Body - Content Projection -->
  <div class="card-body">
    <!-- 
      <ng-content> - Content Projection
      Projects content from parent with selector="[card-body]"
    -->
    <ng-content select="[card-body]"></ng-content>
  </div>

  <!-- Card Footer with Action Button -->
  <div class="card-footer bg-transparent border-0 pt-0">
    <button 
      class="btn btn-sm btn-primary w-100" 
      (click)="onActionClick($event)"
      [disabled]="disableAction">
      <i class="bi bi-arrow-right-circle me-2"></i>
      {{ actionLabel }}
    </button>
  </div>
</div>
